# Wireframe tile catalog — the building blocks the wireframe generator picks
# from when laying out a campaign page.
#
# Edit freely: rename, add, remove, or change widths — this file is the one
# input only you can supply; everything downstream (the tile picker in the
# planner UI, the Excel wireframe export) reads from it.
#
# Fields:
#   id     — stable key, never change once campaigns reference it
#   label  — human-readable name shown in the UI / Excel
#   width  — mockup width in grid units out of 4 (1=quarter, 2=half, 4=full)
#   height — mockup height in rows (just affects how tall the Excel block is)
#   notes  — optional placement guidance

tiles:
  - id: hero_banner
    label: Hero Banner
    width: 4
    height: 2
    notes: Top-of-homepage banner

  - id: tier1_banner
    label: Tier 1 Banner
    width: 4
    height: 2

  - id: tier2_banner
    label: Tier 2 Banner
    width: 2
    height: 1

  - id: tier2_banner_carousel
    label: Tier 2 Banner + Carousel
    width: 4
    height: 2
    notes: Tier 2 banner followed by a product/brand carousel

  - id: carousel
    label: Carousel
    width: 4
    height: 2

  - id: roundel
    label: Roundel
    width: 1
    height: 1
    notes: Small circular icon row entry point

  - id: top_brands_tile
    label: Top Brands Tile
    width: 2
    height: 1

  - id: trend_tile
    label: Trend Tile
    width: 2
    height: 1

  - id: vertical_tile_carousel
    label: Vertical Tile + Carousel
    width: 4
    height: 2

  - id: cross_nudge
    label: Cross Nudge
    width: 1
    height: 1
    notes: Cross-category/cross-brand nudge unit

  - id: mobile_category_page_tiles
    label: Mobile Category Page Tiles
    width: 4
    height: 2

  - id: tier2_banner_tiles
    label: Tier 2 Banner + Tiles
    width: 4
    height: 2

  - id: tier1_banner_tiles
    label: Tier 1 Banner + Tiles
    width: 4
    height: 2

  - id: tiles_on_feed
    label: Tiles on Feed
    width: 4
    height: 2

  - id: thin_strip_banner
    label: Thin Strip Banner
    width: 4
    height: 1

  - id: strip_banner
    label: Strip Banner
    width: 4
    height: 1
