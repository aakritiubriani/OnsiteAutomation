# ============================================================================
# calendar_config.yaml  —  Stage 1 / Layer 1 campaign generation engine
# ----------------------------------------------------------------------------
# OWNED BY: Onsite Strategy Specialist, Namshi
# PURPOSE : Defines the recurring, calendar-predictable campaigns the engine
#           maps onto a target month. This is a SEED derived from 15 months of
#           history — review and confirm before every real run.
#
# HOW DATES WORK (important):
#   - fixed_date_events  -> recur every year on the same date/rule. Safe.
#   - seasonal_windows   -> approximate month ranges. Refine to taste.
#   - monthly_anchors    -> appear (almost) every month. Safe.
#   - lunar_events       -> SHIFT EVERY YEAR. dates listed per year. VERIFY.
#   - sports_events      -> fixture-driven. dates listed per year. VERIFY.
#
# RULE: anything with `needs_date_confirmation: true` MUST be checked against a
#       confirmed source before you trust the generated calendar. Getting a
#       lunar/sports date wrong silently corrupts the whole month's draft.
# ============================================================================

meta:
  schema_version: 1
  source: "Master_Campaign_Calendr.xlsx (Mar 2025 - Jun 2026)"
  default_geography: "KSA + UAE"
  notes: "Tiers/categories are typical values from history; the engine marks generated rows needs_review=TRUE so the specialist can adjust."

